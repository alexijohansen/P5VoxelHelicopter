<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Voxel Helicopter Simulator</title>
  <style>
    :root {
      --accent: #00ff41;
      --bg-glass: rgba(10, 10, 10, 0.7);
    }
    body {
      padding: 0;
      margin: 0;
      background-color: #050505;
      color: var(--accent);
      font-family: 'Courier New', Courier, monospace;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      pointer-events: none;
      text-shadow: 2px 2px 2px rgba(0,0,0,0.8);
      z-index: 10;
    }
    canvas {
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
      image-rendering: pixelated;
    }
    
    /* Config Icon */
    #config-icon {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      z-index: 20;
      transition: transform 0.3s ease;
      opacity: 0.7;
    }
    #config-icon:hover {
      transform: rotate(45deg);
      opacity: 1;
    }

    /* Modal Styling */
    #config-modal {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 320px;
      padding: 25px;
      background: var(--bg-glass);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      display: none;
      flex-direction: column;
      gap: 15px;
      z-index: 30;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    #config-modal h2 {
      margin: 0 0 10px 0;
      font-size: 1.2em;
      text-transform: uppercase;
      letter-spacing: 2px;
      text-align: center;
    }
    .setting {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .setting label {
      font-size: 0.8em;
      display: flex;
      justify-content: space-between;
    }
    input[type=range] {
      -webkit-appearance: none;
      background: rgba(0, 255, 65, 0.2);
      height: 4px;
      border-radius: 2px;
      outline: none;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 10px var(--accent);
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 10px;
    }
    button {
      flex: 1;
      background: rgba(0, 255, 65, 0.1);
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 8px;
      cursor: pointer;
      font-family: inherit;
      text-transform: uppercase;
      font-size: 0.8em;
      transition: all 0.2s ease;
    }
    button:hover {
      background: var(--accent);
      color: #000;
    }
    #error-log {
      position: absolute;
      bottom: 10px;
      left: 10px;
      color: #ff4444;
      font-size: 0.7em;
    }
  </style>
  <script src="p5.min.js"></script>
  <script src="main.js"></script>
</head>

<body>
  <!-- HUD -->
  <div id="ui">
    <div style="font-weight: bold; font-size: 1.2em; letter-spacing: 1px;">VOXEL COMMAND V2</div>
    <div id="status">STATUS: INITIALIZING...</div>
    <div id="fps">FPS: --</div>
    <div id="pos">POS: --</div>
  </div>

  <!-- Settings Icon -->
  <div id="config-icon" onclick="toggleConfig()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"></circle>
      <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
    </svg>
  </div>

  <!-- Settings Modal -->
  <div id="config-modal">
    <h2>Flight Deck Tuning</h2>
    
    <div class="setting">
      <label>Turn Sensitivity <span id="v-turn">0.001</span></label>
      <input type="range" id="s-turn" min="0.0001" max="0.01" step="0.0001" value="0.001">
    </div>

    <div class="setting">
      <label>Banking (Roll) <span id="v-roll">3</span></label>
      <input type="range" id="s-roll" min="0" max="10" step="0.1" value="3">
    </div>

    <div class="setting">
      <label>Tilt (Pitch) <span id="v-pitch">8</span></label>
      <input type="range" id="s-pitch" min="0" max="20" step="0.1" value="8">
    </div>

    <div class="setting">
      <label>Acceleration <span id="v-accel">0.75</span></label>
      <input type="range" id="s-accel" min="0.01" max="2.0" step="0.01" value="0.75">
    </div>

    <div class="setting">
      <label>Terrain Height <span id="v-map">100</span></label>
      <input type="range" id="s-map" min="10" max="400" step="1" value="100">
    </div>

    <div class="setting">
      <label>Start Altitude <span id="v-start-h">100</span></label>
      <input type="range" id="s-start-h" min="5" max="500" step="1" value="100">
    </div>

    <div class="buttons">
      <button onclick="resetConfig()">Reset</button>
      <button onclick="toggleConfig()">Close</button>
    </div>
  </div>

  <div id="error-log"></div>
  <main></main>
</body>

</html>
